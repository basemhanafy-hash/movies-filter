<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فلتر الأفلام العائلي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f1e;--surface:#111827;--card:#1a2235;--border:#2a3550;--accent:#f59e0b;--accent2:#10b981;--danger:#ef4444;--warn:#f97316;--text:#e2e8f0;--muted:#64748b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Cairo,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#0f172a,#1e1b4b,#0f172a);border-bottom:1px solid var(--border);padding:20px 28px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.header h1{font-size:22px;font-weight:900;color:var(--accent)}.header p{font-size:12px;color:var(--muted);margin-top:2px}
.badge{margin-right:auto;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 14px;text-align:center;font-size:12px;color:var(--muted)}
.badge strong{display:block;font-size:20px;color:var(--accent);font-weight:900}
.main{max-width:860px;margin:0 auto;padding:24px 16px}
.setup{background:var(--card);border:2px solid var(--accent);border-radius:16px;padding:28px;margin-bottom:20px}
.setup h2{font-size:18px;font-weight:900;color:var(--accent);margin-bottom:8px}
.setup p{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:16px}
.progress-wrap{background:var(--surface);border-radius:10px;height:12px;overflow:hidden;margin-bottom:8px}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),#10b981);border-radius:10px;transition:width .3s;width:0%}
.progress-text{font-size:13px;color:var(--muted);text-align:center;margin-bottom:16px}
.log{background:var(--surface);border-radius:8px;padding:12px;height:130px;overflow-y:auto;font-size:12px;font-family:monospace;direction:ltr}
.log div{padding:2px 0;border-bottom:1px solid var(--border)}
.lok{color:#34d399}.lwarn{color:#fb923c}.lbad{color:#f87171}
.app{display:none}
.sbox{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:18px;margin-bottom:18px}
.sbox:focus-within{border-color:var(--accent)}
.slabel{display:block;font-size:13px;color:var(--muted);margin-bottom:8px}
.srow{display:flex;gap:10px;position:relative}
.sinp{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 15px;color:var(--text);font-family:Cairo,sans-serif;font-size:15px;direction:rtl}
.sinp:focus{outline:none;border-color:var(--accent)}.sinp::placeholder{color:var(--muted)}
.btn{background:var(--accent);color:#000;border:none;border-radius:10px;padding:11px 20px;font-family:Cairo,sans-serif;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .2s}
.btn:hover{background:#d97706}.btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
.btn.sec{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn.sec:hover{background:var(--card)}
.hint{font-size:12px;color:var(--muted);margin-top:8px}
.sugg{background:var(--surface);border:1px solid var(--border);border-radius:10px;position:absolute;top:100%;right:0;left:0;z-index:10;max-height:200px;overflow-y:auto;display:none;margin-top:4px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.sugg.show{display:block}
.si{padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--border)}
.si:hover{background:var(--card)}.si:last-child{border-bottom:none}
.rcard{background:var(--card);border-radius:14px;padding:22px;margin-bottom:16px;border:2px solid var(--border);animation:fin .3s ease}
@keyframes fin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.rheader{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}
.rico{font-size:34px;flex-shrink:0}
.rtitle{font-size:18px;font-weight:700}
.rbadge{margin-right:auto;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;flex-shrink:0}
.rs{background:#064e3b;color:#34d399;border:1px solid #065f46}
.rc{background:#431407;color:#fb923c;border:1px solid #7c2d12}
.ra{background:#450a0a;color:#f87171;border:1px solid #7f1d1d}
.cats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.cat{background:var(--surface);border-radius:8px;padding:9px 12px;font-size:13px;display:flex;align-items:center;gap:8px}
.cn{color:var(--accent2)}.cm{color:var(--warn)}.cs{color:var(--danger)}
.sumbox{background:var(--surface);border-radius:8px;padding:12px 14px;font-size:14px;line-height:1.7;color:#cbd5e1;margin-bottom:10px}
.verd{border-radius:8px;padding:10px 14px;font-size:13px;font-weight:600}
.vrs{background:#022c22;color:#34d399;border:1px solid #064e3b}
.vrc{background:#2c1008;color:#fb923c;border:1px solid #431407}
.vra{background:#2c0808;color:#f87171;border:1px solid #450a0a}
.tabs{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:7px 16px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-family:Cairo,sans-serif;font-size:13px;font-weight:600}
.tab.on{background:var(--accent);color:#000;border-color:var(--accent)}
.tc{display:none}.tc.on{display:block}
.brow{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;margin-bottom:5px;background:var(--surface);font-size:13px;border-right:3px solid var(--border);cursor:pointer}
.brow:hover{opacity:.85}
.hgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:6px;margin-top:10px}
.hi{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;overflow:hidden;white-space:nowrap}
.hi:hover{border-color:var(--accent);color:var(--accent)}
.hs{border-right:3px solid #34d399}.hc{border-right:3px solid #fb923c}.ha{border-right:3px solid #f87171}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.stat{background:var(--card);border-radius:10px;padding:14px;text-align:center;border:1px solid var(--border)}
.stat strong{display:block;font-size:22px;font-weight:900}
.stat span{font-size:12px;color:var(--muted)}
.stat.ss strong{color:#34d399}.stat.sc strong{color:#fb923c}.stat.sa strong{color:#f87171}
</style>
</head>
<body>
<div class="header">
  <div style="font-size:36px">🎬</div>
  <div><h1>فلتر الأفلام العائلي</h1><p id="hstatus">جاهز</p></div>
  <div class="badge"><strong id="dbcount">0</strong>فيلم محلل</div>
</div>
<div class="main">

  <!-- Setup Screen -->
  <div id="setupScreen" class="setup">
    <h2>🔧 إعداد قاعدة البيانات</h2>
    <p>اضغط "ابدأ البناء" لتحليل كل أفلامك الـ 1318 وحفظ النتائج في متصفحك تلقائياً.<br>
    <strong style="color:var(--accent)">⏱️ يستغرق حوالي 15-20 دقيقة — مرة واحدة فقط للأبد!</strong></p>
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      <button class="btn" id="startBtn" onclick="startBuild()">🚀 ابدأ البناء</button>
      <button class="btn sec" id="resumeBtn" style="display:none" onclick="resumeBuild()">▶️ استكمال</button>
      <button class="btn sec" onclick="skipSetup()">تخطي</button>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="pbar"></div></div>
    <div class="progress-text" id="ptext">0 / 1318</div>
    <div class="log" id="log"></div>
  </div>

  <!-- Main App -->
  <div class="app" id="appScreen">
    <div class="stats-row">
      <div class="stat ss"><strong id="sc">0</strong><span>✅ مناسب</span></div>
      <div class="stat sc"><strong id="wc">0</strong><span>⚠️ تحذير</span></div>
      <div class="stat sa"><strong id="ac">0</strong><span>🚫 غير مناسب</span></div>
    </div>
    <div class="tabs">
      <button class="tab on" id="tb1" onclick="sw(this,'t1')">🔍 فيلم واحد</button>
      <button class="tab" id="tb2" onclick="sw(this,'t2')">📋 فحص متعدد</button>
      <button class="tab" id="tb3" onclick="sw(this,'t3')">📊 كل المكتبة</button>
      <button class="btn sec" style="margin-right:auto;padding:6px 12px;font-size:12px;border-radius:7px" onclick="goSetup()">⚙️ إعادة بناء</button>
    </div>

    <div id="t1" class="tc on">
      <div class="sbox">
        <label class="slabel">ابحث في مكتبتك</label>
        <div class="srow">
          <input type="text" id="inp" class="sinp" placeholder="اكتب اسم الفيلم..." autocomplete="off">
          <div id="sugg" class="sugg"></div>
          <button class="btn" onclick="checkSingle()">فحص</button>
        </div>
        <div class="hint">💡 النتائج فورية من قاعدة البيانات المحلية</div>
      </div>
      <div id="res"></div>
    </div>

    <div id="t2" class="tc">
      <div class="sbox">
        <label class="slabel">فحص عدة أفلام</label>
        <textarea id="batch" class="sinp" style="width:100%;height:110px;resize:vertical" placeholder="كل فيلم في سطر..."></textarea>
        <div style="margin-top:10px;display:flex;gap:8px">
          <button class="btn" onclick="doBatch()">🔍 فحص الكل</button>
          <button class="btn sec" onclick="addSample()">➕ أمثلة</button>
        </div>
        <div id="bres" style="margin-top:14px"></div>
      </div>
    </div>

    <div id="t3" class="tc">
      <div class="sbox">
        <label class="slabel">تصفية المكتبة</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
          <button class="btn" onclick="filterLib('all')">الكل</button>
          <button class="btn" style="background:#064e3b;color:#34d399" onclick="filterLib('safe')">✅ مناسب</button>
          <button class="btn" style="background:#431407;color:#fb923c" onclick="filterLib('caution')">⚠️ تحذير</button>
          <button class="btn" style="background:#450a0a;color:#f87171" onclick="filterLib('avoid')">🚫 غير مناسب</button>
          <button class="btn sec" onclick="exportCSV()">📥 تصدير CSV</button>
        </div>
        <div id="liblist" style="max-height:500px;overflow-y:auto"></div>
      </div>
    </div>

    <div id="hist" style="display:none;margin-top:20px">
      <div style="font-size:13px;color:var(--muted);font-weight:600">📂 آخر عمليات البحث</div>
      <div class="hgrid" id="hgrid"></div>
    </div>
  </div>
</div>

const STORAGE_KEY = 'ffdb_v2';
let DB = {};
let buildQueue = [];

function saveDB() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(DB)); } catch(e) {}
}
function loadDB() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { DB = JSON.parse(raw); return true; }
  } catch(e) {}
  return false;
}
function updateDBCount() {
  document.getElementById('dbcount').textContent = Object.keys(DB).length;
}
function updateStats() {
  var s=0, c=0, a=0;
  Object.values(DB).forEach(function(v) {
    if(v.r==='safe') s++;
    else if(v.r==='caution') c++;
    else if(v.r==='avoid') a++;
  });
  document.getElementById('sc').textContent = s;
  document.getElementById('wc').textContent = c;
  document.getElementById('ac').textContent = a;
}

window.addEventListener('load', function() {
  loadDB();
  updateDBCount();
  var saved = Object.keys(DB).length;
  if (saved > 0) {
    var resumeBtn = document.getElementById('resumeBtn');
    resumeBtn.style.display = 'inline-block';
    resumeBtn.textContent = 'استكمال (' + (MOVIES.length - saved) + ' متبقي)';
    if (saved >= MOVIES.length) { skipSetup(); return; }
  }
  updateStats();
});

function skipSetup() {
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('hstatus').textContent = Object.keys(DB).length + ' فيلم محلل';
  updateStats();
}
function goSetup() {
  document.getElementById('setupScreen').style.display = 'block';
  document.getElementById('appScreen').style.display = 'none';
}

async function startBuild() {
  buildQueue = MOVIES.filter(function(m) { return !DB[m]; });
  if (!buildQueue.length) { skipSetup(); return; }
  document.getElementById('startBtn').disabled = true;
  document.getElementById('resumeBtn').style.display = 'none';
  await runBuild();
}
async function resumeBuild() {
  buildQueue = MOVIES.filter(function(m) { return !DB[m]; });
  document.getElementById('resumeBtn').disabled = true;
  await runBuild();
}

async function runBuild() {
  var total = MOVIES.length;
  var log = document.getElementById('log');
  for (var i = 0; i < buildQueue.length; i++) {
    var movie = buildQueue[i];
    var done = (total - buildQueue.length) + i + 1;
    var pct = Math.round((done / total) * 100);
    document.getElementById('pbar').style.width = pct + '%';
    document.getElementById('ptext').textContent = done + ' / ' + total + ' (' + pct + '%)';
    document.getElementById('hstatus').textContent = 'جاري البناء ' + pct + '%';
    try {
      var resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 250,
          system: 'Reply with JSON only, no extra text: {"r":"safe|caution|avoid","n":"none|mild|strong","v":"none|mild|strong","l":"none|mild|strong","t":"none|mild|strong","s":"short Arabic summary","vd":"short Arabic verdict"}',
          messages: [{ role: 'user', content: 'Rate for family viewing: ' + movie }]
        })
      });
      var data = await resp.json();
      var text = data.content[0].text.replace(/```json|```/g, '').trim();
      var info = JSON.parse(text);
      DB[movie] = info;
      saveDB();
      updateDBCount();
      var icons = { safe: '✅', caution: '⚠️', avoid: '🚫' };
      var entry = document.createElement('div');
      entry.className = info.r === 'safe' ? 'lok' : info.r === 'caution' ? 'lwarn' : 'lbad';
      entry.textContent = (icons[info.r] || '?') + ' ' + movie;
      log.appendChild(entry);
      log.scrollTop = log.scrollHeight;
    } catch(e) {
      var entry2 = document.createElement('div');
      entry2.textContent = 'skip: ' + movie;
      log.appendChild(entry2);
      log.scrollTop = log.scrollHeight;
      await new Promise(function(r) { setTimeout(r, 3000); });
    }
    await new Promise(function(r) { setTimeout(r, 350); });
  }
  document.getElementById('ptext').textContent = 'اكتمل! ' + Object.keys(DB).length + ' فيلم';
  updateStats();
  setTimeout(skipSetup, 1500);
}

// Search
var inp = document.getElementById('inp');
var sugg = document.getElementById('sugg');
var hist = [];

inp.addEventListener('input', function() {
  var q = inp.value.trim().toLowerCase();
  if (q.length < 2) { sugg.classList.remove('show'); return; }
  var matches = MOVIES.filter(function(x) { return x.toLowerCase().includes(q); }).slice(0, 8);
  if (!matches.length) { sugg.classList.remove('show'); return; }
  sugg.innerHTML = matches.map(function(x) {
    var info = DB[x];
    var icon = info ? (info.r === 'safe' ? '✅' : info.r === 'caution' ? '⚠️' : '🚫') : '🎬';
    return '<div class="si" data-name="' + x.replace(/"/g, '&quot;') + '" onclick="selMovie(this.dataset.name)">' + icon + ' ' + x + '</div>';
  }).join('');
  sugg.classList.add('show');
});
inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') checkSingle(); });
document.addEventListener('click', function(e) { if (!e.target.closest('.sbox')) sugg.classList.remove('show'); });

function selMovie(n) { inp.value = n; sugg.classList.remove('show'); checkSingle(); }

function sw(btn, tab) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('on'); });
  document.querySelectorAll('.tc').forEach(function(t) { t.classList.remove('on'); });
  btn.classList.add('on');
  document.getElementById(tab).classList.add('on');
}

function checkSingle(name) {
  var mn = name || inp.value.trim();
  if (!mn) return;
  sugg.classList.remove('show');
  var info = DB[mn];
  if (!info) {
    var key = Object.keys(DB).find(function(k) {
      return k.toLowerCase().replace(/[^a-z0-9]/g,'').includes(mn.toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,10));
    });
    if (key) info = DB[key];
  }
  if (info) {
    addHist(mn, info.r);
    showResult(info, mn);
  } else {
    document.getElementById('res').innerHTML = '<div style="background:var(--surface);border-radius:8px;padding:14px;font-size:13px;color:var(--muted);border:1px solid var(--border)">❓ لم يُحلَّل هذا الفيلم بعد. اضغط "إعادة بناء" لتحليل كل الأفلام.</div>';
  }
}

function showResult(info, title) {
  var rm = {
    safe: { l: '✅ مناسب للعائلة', c: 'rs', i: '✅', v: 'vrs' },
    caution: { l: '⚠️ تحذير', c: 'rc', i: '⚠️', v: 'vrc' },
    avoid: { l: '🚫 غير مناسب', c: 'ra', i: '🚫', v: 'vra' }
  };
  var cl = { n: '👗 مشاهد عارية', v: '⚔️ عنف', l: '🗣️ ألفاظ', t: '🎭 مواضيع' };
  var cc = { none: 'cn', mild: 'cm', strong: 'cs' };
  var ct = { none: 'لا يوجد', mild: 'خفيف', strong: 'صريح' };
  var r = rm[info.r] || rm.caution;
  var cats = Object.entries(cl).map(function(e) {
    var v = info[e[0]] || 'none';
    return '<div class="cat ' + cc[v] + '">' + e[1] + '<span style="margin-right:auto">' + ct[v] + '</span></div>';
  }).join('');
  document.getElementById('res').innerHTML =
    '<div class="rcard"><div class="rheader">' +
    '<div class="rico">' + r.i + '</div>' +
    '<div><div class="rtitle">' + title + '</div></div>' +
    '<div class="rbadge ' + r.c + '">' + r.l + '</div></div>' +
    '<div class="cats">' + cats + '</div>' +
    '<div class="sumbox">📝 ' + info.s + '</div>' +
    '<div class="verd ' + r.v + '">💬 ' + info.vd + '</div></div>';
}

function addHist(name, rating) {
  if (hist.find(function(h) { return h.n === name; })) return;
  hist.unshift({ n: name, r: rating });
  if (hist.length > 16) hist.pop();
  renderHist();
}
function renderHist() {
  if (!hist.length) return;
  document.getElementById('hist').style.display = 'block';
  var cm = { safe: 'hs', caution: 'hc', avoid: 'ha' };
  var im = { safe: '✅', caution: '⚠️', avoid: '🚫' };
  document.getElementById('hgrid').innerHTML = hist.map(function(h) {
    return '<div class="hi ' + cm[h.r] + '" data-n="' + h.n.replace(/"/g,'&quot;') + '" onclick="inp.value=this.dataset.n;checkSingle()">' + im[h.r] + ' <span style="overflow:hidden;text-overflow:ellipsis">' + h.n + '</span></div>';
  }).join('');
}

function doBatch() {
  var lines = document.getElementById('batch').value.trim().split('\n').filter(function(l) { return l.trim(); });
  if (!lines.length) return;
  var icons = { safe: '✅', caution: '⚠️', avoid: '🚫' };
  var colors = { safe: '#34d399', caution: '#fb923c', avoid: '#f87171' };
  var html = '';
  lines.forEach(function(line) {
    var name = line.trim();
    var info = DB[name];
    if (info) {
      html += '<div class="brow" style="border-right-color:' + colors[info.r] + '" data-n="' + name.replace(/"/g,'&quot;') + '" onclick="selSingle(this.dataset.n)">' +
        '<span style="font-size:18px">' + icons[info.r] + '</span>' +
        '<span style="flex:1;font-weight:600">' + name + '</span>' +
        '<span style="font-size:12px;color:' + colors[info.r] + '">' + info.vd.slice(0,35) + '</span></div>';
      addHist(name, info.r);
    } else {
      html += '<div class="brow"><span style="font-size:18px">❓</span><span style="flex:1;font-weight:600">' + name + '</span><span style="font-size:12px;color:var(--muted)">لم يُحلَّل بعد</span></div>';
    }
  });
  document.getElementById('bres').innerHTML = html;
}

function selSingle(name) {
  inp.value = name;
  sw(document.getElementById('tb1'), 't1');
  checkSingle();
}

function addSample() {
  document.getElementById('batch').value = MOVIES.slice(0, 12).join('\n');
}

function filterLib(filter) {
  var icons = { safe: '✅', caution: '⚠️', avoid: '🚫' };
  var colors = { safe: '#34d399', caution: '#fb923c', avoid: '#f87171' };
  var entries = MOVIES.filter(function(m) {
    if (!DB[m]) return false;
    return filter === 'all' || DB[m].r === filter;
  });
  if (!entries.length) {
    document.getElementById('liblist').innerHTML = '<div style="color:var(--muted);font-size:13px;padding:12px">لا توجد نتائج - ابن قاعدة البيانات أولاً</div>';
    return;
  }
  var html = '';
  entries.forEach(function(m) {
    var info = DB[m];
    html += '<div class="brow" style="border-right-color:' + colors[info.r] + '" data-n="' + m.replace(/"/g,'&quot;') + '" onclick="selSingle(this.dataset.n)">' +
      '<span style="font-size:16px">' + icons[info.r] + '</span>' +
      '<span style="flex:1;font-size:13px;font-weight:600">' + m + '</span>' +
      '<span style="font-size:11px;color:' + colors[info.r] + '">' + info.vd.slice(0,30) + '</span></div>';
  });
  document.getElementById('liblist').innerHTML = html;
}

function exportCSV() {
  var map = { safe: 'مناسب', caution: 'تحذير', avoid: 'غير مناسب' };
  var lv = { none: 'لا يوجد', mild: 'خفيف', strong: 'صريح' };
  var csv = 'الفيلم,التصنيف,مشاهد عارية,عنف,الفاظ,مواضيع,الملاحظات\n';
  MOVIES.forEach(function(m) {
    var i = DB[m];
    if (i) csv += '"' + m + '","' + (map[i.r]||'') + '","' + (lv[i.n]||'') + '","' + (lv[i.v]||'') + '","' + (lv[i.l]||'') + '","' + (lv[i.t]||'') + '","' + (i.vd||'') + '"\n';
  });
  var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'تقرير_الافلام.csv';
  a.click();
}
